document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;}\n  body{\n    min-height:100vh;\n    padding:48px 56px 72px;\n    background-image:\n      radial-gradient(circle at 1px 1px, var(--dot) 1px, transparent 1.4px);\n    background-size: 22px 22px;\n  }\n\n  .sheet{ max-width:1280px;margin:0 auto; }\n\n  header.top{\n    display:flex;align-items:flex-end;justify-content:flex-end;\n    border-bottom:1px solid var(--rule);\n    padding-bottom:18px;margin-bottom:28px;gap:32px;\n  }\n  .meta{\n    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);\n    text-align:right;line-height:1.7;letter-spacing:0.02em;\n  }\n\n  /* ============ MAP ============ */\n  .map{\n    position:relative;\n    background:var(--paper-2);\n    border:1px solid var(--rule);\n    border-radius:4px;\n    padding:28px 28px 22px;\n  }\n\n  .tick{position:absolute;width:14px;height:14px;border:1.5px solid var(--ink);opacity:0.5}\n  .tick.tl{top:10px;left:10px;border-right:none;border-bottom:none}\n  .tick.tr{top:10px;right:10px;border-left:none;border-bottom:none}\n  .tick.bl{bottom:10px;left:10px;border-right:none;border-top:none}\n  .tick.br{bottom:10px;right:10px;border-left:none;border-top:none}\n\n  /* Top row: entrance / board / entrance / ice cream */\n  .row-top{\n    display:grid;\n    grid-template-columns: 180px 1fr 180px 90px;\n    gap:18px;\n    align-items:center;\n    margin-bottom:18px;\n  }\n  .ice-cream{\n    width:90px;height:90px;border-radius:50%;\n    border:2px solid var(--pink);\n    background: color-mix(in oklch, var(--pink) 10%, var(--paper));\n    display:flex;align-items:center;justify-content:center;\n    text-align:center;\n    font-family:'Inter',sans-serif;font-weight:600;\n    color:var(--pink);font-size:13px;line-height:1.1;\n    letter-spacing:-0.005em;\n    justify-self:center;\n  }\n  .entrance{\n    border:1.5px solid var(--ink);\n    border-radius:3px;\n    padding:14px 16px;\n    font-family:'JetBrains Mono',monospace;font-size:12px;\n    display:flex;align-items:center;justify-content:space-between;\n    background:var(--paper);\n    position:relative;\n    letter-spacing:0.04em;text-transform:uppercase;\n  }\n  .entrance .arrow{color:var(--ink-soft);font-size:13px}\n  .entrance::after{\n    content:\"\";position:absolute;\n    top:-2px;left:50%;transform:translateX(-50%);\n    width:44px;height:3px;\n    background:var(--paper-2);\n    border-left:1.5px solid var(--ink);\n    border-right:1.5px solid var(--ink);\n  }\n  .entrance .hinge{\n    position:absolute;width:32px;height:1.5px;background:var(--ink);opacity:0.55;\n    top:4px;left:50%;transform-origin:left center;\n    transform:translateX(-50%) rotate(26deg);\n  }\n  .board{\n    border:1.5px solid var(--ink);\n    border-radius:3px;\n    padding:16px 20px;\n    text-align:center;\n    background:\n      repeating-linear-gradient(135deg, transparent 0 8px, oklch(0.92 0.01 80) 8px 9px),\n      var(--paper);\n    font-family:'JetBrains Mono',monospace;\n    letter-spacing:0.08em;text-transform:uppercase;font-size:13px;\n  }\n  .board .note{font-size:10px;color:var(--ink-soft);margin-top:4px;letter-spacing:0.04em;text-transform:none}\n\n  /* Main body layout — food centered, right side is 2-col sub-grid */\n  .body-grid{\n    display:grid;\n    grid-template-columns: 1.1fr 0.32fr 1.1fr;\n    grid-template-rows: auto;\n    gap:14px;\n    min-height:420px;\n  }\n  .right-stack{\n    grid-column:3;grid-row:1;\n    display:grid;\n    grid-template-columns: 1fr 1fr;\n    grid-template-rows: 1fr 1.3fr 1fr;\n    gap:14px;\n  }\n\n  .zone{\n    position:relative;\n    border-radius:4px;\n    padding:14px 16px;\n    background:var(--paper);\n    overflow:hidden;\n    min-height:72px;\n    display:flex;flex-direction:column;justify-content:center;\n  }\n  .zone::before{\n    content:\"\";position:absolute;inset:0;\n    border:2px solid var(--z, var(--ink));\n    border-radius:4px;\n    pointer-events:none;\n  }\n  .zone::after{\n    content:\"\";position:absolute;inset:0;\n    background: var(--z, var(--ink));\n    opacity:0.05;\n    pointer-events:none;\n  }\n  .zone .head{\n    display:flex;align-items:baseline;gap:8px;\n    position:relative;z-index:1;flex-wrap:wrap;\n  }\n  .zone .num{\n    font-family:'JetBrains Mono',monospace;font-size:10px;\n    color:var(--z);opacity:0.7;letter-spacing:0.05em;\n  }\n  .zone .name{\n    font-size:15px;font-weight:600;color:var(--z);letter-spacing:-0.005em;line-height:1.2;\n  }\n  .zone .desc{\n    font-family:'JetBrains Mono',monospace;font-size:10.5px;\n    color:var(--ink-soft);line-height:1.5;\n    position:relative;z-index:1;text-transform:lowercase;margin-top:4px;\n  }\n\n  /* Layout assignments */\n  .z-csp    { --z: var(--purple); grid-column:1; grid-row:1; }\n  .z-food   { --z: var(--black);  grid-column:2; grid-row:1; }\n  .z-cse    { --z: var(--blue);   grid-column:1; grid-row:1; }\n  .z-pwp    { --z: var(--green);  grid-column:2; grid-row:1; }\n  .z-pers   { --z: var(--yellow); grid-column:1 / span 2; grid-row:2; }\n  .z-pov    { --z: var(--orange); grid-column:1; grid-row:3; }\n  .z-senior { --z: var(--red);    grid-column:2; grid-row:3; }\n\n  /* Food is a tall vertical strip with rotated label */\n  .z-food{\n    padding:12px 6px;\n    display:flex;align-items:center;justify-content:center;\n  }\n  .z-food .vertical{\n    writing-mode: vertical-rl;\n    transform: rotate(180deg);\n    font-family:'JetBrains Mono',monospace;\n    font-size:13px;font-weight:600;\n    letter-spacing:0.15em;text-transform:uppercase;\n    color:var(--black);\n    position:relative;z-index:1;\n  }\n  .z-food .sub{\n    writing-mode: vertical-rl;\n    transform: rotate(180deg);\n    font-family:'JetBrains Mono',monospace;font-size:10px;\n    color:var(--ink-soft);letter-spacing:0.08em;\n    margin-left:4px;position:relative;z-index:1;\n  }\n\n  /* ============ LEGEND ============ */\n  .legend{\n    display:grid;grid-template-columns:repeat(8,1fr);gap:10px;\n    margin-top:24px;\n  }\n  .swatch{\n    display:flex;align-items:center;gap:8px;\n    font-family:'JetBrains Mono',monospace;font-size:10px;\n    color:var(--ink-soft);\n    padding:9px 10px;border:1px solid var(--rule);border-radius:3px;\n    background:var(--paper-2);\n  }\n  .swatch .dot{\n    width:10px;height:10px;border-radius:2px;background:var(--c);flex:none;\n  }\n  .swatch b{color:var(--ink);font-weight:500;text-transform:uppercase;letter-spacing:0.04em}\n\n  footer{\n    margin-top:22px;display:flex;justify-content:space-between;align-items:center;\n    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);\n    letter-spacing:0.04em;\n  }\n  .compass{display:flex;align-items:center;gap:8px}\n\n  /* ====== ROTATE GATE (mobile portrait) ====== */\n  .rotate-gate{\n    display:none;\n    position:fixed;inset:0;z-index:9999;\n    background:var(--paper);\n    padding:32px;\n    flex-direction:column;align-items:center;justify-content:center;\n    text-align:center;gap:18px;\n  }\n  .rotate-gate .icon{\n    width:88px;height:88px;\n    animation: rot 2.4s ease-in-out infinite;\n    color:var(--ink);\n  }\n  @keyframes rot{\n    0%,20% { transform: rotate(0deg) }\n    60%,100% { transform: rotate(-90deg) }\n  }\n  .rotate-gate h2{\n    margin:0;font-size:22px;font-weight:600;letter-spacing:-0.01em;\n  }\n  .rotate-gate p{\n    margin:0;font-family:'JetBrains Mono',monospace;\n    font-size:12px;color:var(--ink-soft);line-height:1.6;max-width:280px;\n  }\n\n  /* show gate on small portrait viewports */\n  @media (max-width: 900px) and (orientation: portrait){\n    .rotate-gate{display:flex}\n    .sheet{display:none}\n    html,body{overflow:hidden;height:100%}\n  }\n\n  /* tighten padding on small landscape */\n  @media (max-width: 900px){\n    body{padding:20px 24px}\n    .map{padding:18px}\n    .legend{grid-template-columns:repeat(4,1fr)}\n    .z-pers{padding:8px 16px;min-height:0}\n    .z-pers .desc{margin-top:2px}\n  }\n\n  /* alternate map link */\n  .alt-link{\n    display:inline-flex;align-items:center;gap:8px;\n    font-family:'JetBrains Mono',monospace;font-size:11px;\n    color:var(--ink);letter-spacing:0.04em;\n    text-decoration:none;\n    padding:8px 12px;border:1px solid var(--rule);border-radius:3px;\n    background:var(--paper-2);\n    transition:background 0.15s;\n  }\n  .alt-link:hover{background:var(--paper);border-color:var(--ink-soft)}\n  .alt-link .dot{width:8px;height:8px;border-radius:50%;background:var(--ink-soft)}\n\n  /* alternate map modal */\n  .alt-modal{\n    display:none;\n    position:fixed;inset:0;z-index:10000;\n    background:oklch(0.15 0.01 60 / 0.75);\n    align-items:center;justify-content:center;\n    padding:32px;\n  }\n  .alt-modal.open{display:flex}\n  .alt-modal .frame{\n    background:var(--paper);\n    border-radius:6px;\n    padding:16px;\n    max-width:90vw;max-height:90vh;\n    display:flex;flex-direction:column;gap:10px;\n    box-shadow:0 20px 60px oklch(0.1 0.01 60 / 0.4);\n  }\n  .alt-modal .bar{\n    display:flex;justify-content:space-between;align-items:center;\n    font-family:'JetBrains Mono',monospace;font-size:11px;\n    color:var(--ink-soft);letter-spacing:0.04em;\n  }\n  .alt-modal .close{\n    background:none;border:1px solid var(--rule);border-radius:3px;\n    padding:4px 10px;font-family:inherit;font-size:11px;cursor:pointer;\n    color:var(--ink);\n  }\n  .alt-modal .close:hover{background:var(--paper-2)}\n  .alt-modal img{\n    max-width:100%;max-height:calc(90vh - 60px);\n    object-fit:contain;border-radius:3px;\n  }\n\n  @media print{\n    @page { size: landscape; margin: 0.4cm; }\n    body{padding:10px;background:#fff !important;background-image:none !important}\n    .rotate-gate{display:none !important}\n    .map{background:#fff !important}\n    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  \n\n  <!-- Mobile portrait rotate prompt -->\n  <div class=\"rotate-gate\" aria-hidden=\"true\">\n    <svg class=\"icon\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <rect x=\"14\" y=\"6\" width=\"36\" height=\"52\" rx=\"4\"><\u002Frect>\n      <line x1=\"14\" y1=\"14\" x2=\"50\" y2=\"14\"><\u002Fline>\n      <line x1=\"14\" y1=\"50\" x2=\"50\" y2=\"50\"><\u002Fline>\n      <path d=\"M32 26 l-6 6 6 6\"><\u002Fpath>\n      <path d=\"M26 32 h14\"><\u002Fpath>\n    <\u002Fsvg>\n    <h2>Please rotate your device<\u002Fh2>\n    <p>this map is best viewed in landscape orientation.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"sheet\">\n\n    <header class=\"top\">\n      <div class=\"meta\">\n        <div>student center · showcase floor plan<\u002Fdiv>\n        <div>general map · not to scale<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <div class=\"map\">\n      <span class=\"tick tl\"><\u002Fspan>\n      <span class=\"tick tr\"><\u002Fspan>\n      <span class=\"tick bl\"><\u002Fspan>\n      <span class=\"tick br\"><\u002Fspan>\n\n      <div class=\"row-top\">\n        <div class=\"entrance\">\n          <span>entrance 1<\u002Fspan>\n          <span class=\"arrow\">↓<\u002Fspan>\n          <span class=\"hinge\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"board\">\n          <div class=\"label\">Board<\u002Fdiv>\n          <div class=\"note\">announcements &amp; raffle<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"entrance\">\n          <span>entrance 2<\u002Fspan>\n          <span class=\"arrow\">↓<\u002Fspan>\n          <span class=\"hinge\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ice-cream\" aria-label=\"Ice Cream\">Ice<br>Cream<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"body-grid\">\n\n        <section class=\"zone z-csp\">\n          <div class=\"head\">\n            <span class=\"num\">01<\u002Fspan>\n            <span class=\"name\">CSP<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"desc\">create task projects created in our ap computer science principles classes<\u002Fdiv>\n        <\u002Fsection>\n\n        <section class=\"zone z-food\" aria-label=\"Food\">\n          <span class=\"vertical\">Food<\u002Fspan>\n        <\u002Fsection>\n\n        <div class=\"right-stack\">\n          <section class=\"zone z-cse\">\n            <div class=\"head\">\n              <span class=\"num\">02<\u002Fspan>\n              <span class=\"name\">CSE<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"desc\">projects created in our computer science essentials classes<\u002Fdiv>\n          <\u002Fsection>\n\n          <section class=\"zone z-pwp\">\n            <div class=\"head\">\n              <span class=\"num\">03<\u002Fspan>\n              <span class=\"name\">PWP<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"desc\">projects created in our programming with a purpose classes<\u002Fdiv>\n          <\u002Fsection>\n\n          <section class=\"zone z-pers\">\n            <div class=\"head\">\n              <span class=\"num\">04<\u002Fspan>\n              <span class=\"name\">Personal Projects<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"desc\">independent projects our students have worked on outside of class<\u002Fdiv>\n          <\u002Fsection>\n\n          <section class=\"zone z-pov\">\n            <div class=\"head\">\n              <span class=\"num\">05<\u002Fspan>\n              <span class=\"name\">Poverello Projects<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"desc\">service projects created in collaboration with poverello, a local food drive<\u002Fdiv>\n          <\u002Fsection>\n\n          <section class=\"zone z-senior\">\n            <div class=\"head\">\n              <span class=\"num\">06<\u002Fspan>\n              <span class=\"name\">Senior Projects<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"desc\">projects created in our machine learning, data architecture, and app development classes<\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"legend\">\n      <div class=\"swatch\" style=\"--c:var(--purple)\"><span class=\"dot\"><\u002Fspan><span><b>CSP<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"swatch\" style=\"--c:var(--blue)\"><span class=\"dot\"><\u002Fspan><span><b>CSE<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"swatch\" style=\"--c:var(--green)\"><span class=\"dot\"><\u002Fspan><span><b>PWP<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"swatch\" style=\"--c:var(--yellow)\"><span class=\"dot\"><\u002Fspan><span><b>Personal<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"swatch\" style=\"--c:var(--orange)\"><span class=\"dot\"><\u002Fspan><span><b>Poverello<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"swatch\" style=\"--c:var(--red)\"><span class=\"dot\"><\u002Fspan><span><b>Senior<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"swatch\" style=\"--c:var(--pink)\"><span class=\"dot\"><\u002Fspan><span><b>Ice Cream<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"swatch\" style=\"--c:var(--black)\"><span class=\"dot\"><\u002Fspan><span><b>Food<\u002Fb><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <footer>\n      <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap\">\n        <span>student center · showcase layout<\u002Fspan>\n        <a href=\"#alternate-map\" class=\"alt-link\" id=\"alt-link\"><span class=\"dot\"><\u002Fspan>view alternate map<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"compass\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\">\n          <circle cx=\"14\" cy=\"14\" r=\"11\" stroke=\"currentColor\" stroke-width=\"1\" opacity=\"0.5\"><\u002Fcircle>\n          <path d=\"M14 5 L11.5 14 L14 12 L16.5 14 Z\" fill=\"currentColor\"><\u002Fpath>\n        <\u002Fsvg>\n        <span>orientation · front = top<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n\n  <div class=\"alt-modal\" id=\"alt-modal\" role=\"dialog\" aria-label=\"Alternate map\">\n    <div class=\"frame\">\n      <div class=\"bar\">\n        <span>alternate map · sketch reference<\u002Fspan>\n        <button class=\"close\" id=\"alt-close\">close ×<\u002Fbutton>\n      <\u002Fdiv>\n      <img src=\"9e4a5c98-ffaf-4557-96b3-9bce571b7b12\" alt=\"Alternate hand-drawn map reference\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<script>\n  (function(){\n    var link = document.getElementById('alt-link');\n    var modal = document.getElementById('alt-modal');\n    var close = document.getElementById('alt-close');\n    if(!link||!modal) return;\n    link.addEventListener('click', function(e){ e.preventDefault(); modal.classList.add('open'); });\n    close.addEventListener('click', function(){ modal.classList.remove('open'); });\n    modal.addEventListener('click', function(e){ if(e.target===modal) modal.classList.remove('open'); });\n    document.addEventListener('keydown', function(e){ if(e.key==='Escape') modal.classList.remove('open'); });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
